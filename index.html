<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pål Djuve Vambheim | Winter Cabin Portfolio</title>
    <meta
      name="description"
      content="Interaktiv Three.js-portefølje for utvikler Pål Djuve Vambheim, bygget som en vinterhytte med CV, masteroppgave og utforskbare detaljer."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="day">
    <main class="page-shell">
      <section class="scene-stage">
        <canvas id="scene-canvas" aria-label="Interaktiv 3D-hytte for Pål Djuve Vambheim"></canvas>

        <header class="topbar glass-panel">
          <div class="brand">
            <p class="eyebrow" id="eyebrow"></p>
            <h1 id="hero-name"></h1>
          </div>
          <div class="toolbar">
            <div class="segmented" aria-label="Language switcher">
              <button class="chip" data-language="en" type="button">EN</button>
              <button class="chip is-active" data-language="no" type="button">NO</button>
            </div>
            <button class="mode-toggle" id="theme-toggle" type="button"></button>
          </div>
        </header>

        <aside class="scene-overlay glass-panel">
          <p class="section-label" id="scene-status-label"></p>
          <h2 id="scene-title"></h2>
          <p id="scene-hint"></p>
        </aside>
      </section>
    </main>

    <div class="modal hidden" id="modal" aria-hidden="true">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-panel glass-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <div>
            <p class="section-label" id="modal-kicker"></p>
            <h2 id="modal-title"></h2>
          </div>
          <button class="close-button" id="close-modal" type="button" aria-label="Close panel">×</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
